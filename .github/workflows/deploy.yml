name: Deploy

# Deploy model: upload -> staged promotion (see apps/cloud/DEPLOY.md).
#
# A merge to main runs migrations and UPLOADS a new cloud Worker version
# (`wrangler versions upload`) but does NOT route traffic to it: no Durable
# Objects restart, so in-flight MCP sessions are untouched. Promoting that
# version to live traffic is a separate, deliberate step (`wrangler versions
# deploy`) run via `workflow_dispatch` with an explicit percentage, so the
# blast radius of a promotion (the DO restart it causes) is staged and
# operator-controlled.
#
# Promotion is DECOUPLED from upload: a `workflow_dispatch` that sets
# `promote_percent` runs ONLY the promote-cloud job (no migrate, no upload, so
# it never builds a new version). It promotes the version named by
# `promote_version` (an explicit version id), which is REQUIRED so that
# "widen the same canary" is the natural operation and advancing a rollout can
# never silently promote unreviewed code that landed after the canary. The
# literal value `latest` is an explicit opt-in for the "promote whatever was
# uploaded last" case (e.g. right after a merge); it is never the default.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_percent:
        description: >-
          Promote a cloud version to this percentage of traffic (1-100).
          Leave empty to do nothing (this workflow only uploads on push to
          main; a manual run is for promotion only).
        required: false
        default: ""
      promote_version:
        description: >-
          The cloud version id to promote (from `wrangler versions list`).
          Required when promote_percent is set. Use the literal `latest` to
          promote the most recently uploaded version (opt-in; only correct
          right after the intended merge, never for advancing an existing
          canary).
        required: false
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Runs only on the upload path (push to main). A promote-only
  # workflow_dispatch must not re-run migrations.
  migrate:
    name: Migrate database
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.11-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.11-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run scripts/migrate.ts --bucket executor-cloud-blobs
        working-directory: apps/cloud
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Upload a new cloud version WITHOUT routing traffic to it. This runs on
  # every merge. `wrangler versions upload` does not restart Durable Objects,
  # so live MCP sessions keep running through it (validated empirically: see
  # apps/cloud/DEPLOY.md, experiment 2). Promotion to traffic is a separate,
  # gated step below.
  upload-cloud:
    name: Upload cloud version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    needs: migrate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.11-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.11-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cloud
        run: bun run --cwd apps/cloud build
        env:
          VITE_PUBLIC_SENTRY_DSN: ${{ secrets.VITE_PUBLIC_SENTRY_DSN }}

      - name: Upload cloud version
        run: bun run wrangler versions upload -c dist/server/wrangler.json
        working-directory: apps/cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Promote a specific, already-uploaded cloud version to a chosen percentage
  # of live traffic. DECOUPLED from migrate/upload: it does NOT `needs` them and
  # runs only on a manual `workflow_dispatch` that sets `promote_percent`, so a
  # promotion never builds a new version. The version to promote is named
  # explicitly by `promote_version` (required) so advancing an existing canary
  # widens THAT version rather than silently promoting whatever landed on main
  # since. A promotion moves a Durable Object's version and so restarts DOs whose
  # sessions land on the newly promoted version -- keep `promote_percent` small
  # for the first step of a rollout, watch telemetry, then re-run at a higher
  # percentage for the SAME `promote_version`. See apps/cloud/DEPLOY.md.
  promote-cloud:
    name: Promote cloud version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.promote_percent != ''
    steps:
      # GitHub cannot conditionally require an input, so enforce it here: fail
      # fast (before checkout/build) if promote_version is missing rather than
      # letting the promote script error after the expensive steps.
      - name: Require promote_version
        if: inputs.promote_version == ''
        run: |
          echo "::error::promote_version is required when promote_percent is set. Pass a version id from 'wrangler versions list', or the literal 'latest'."
          exit 1

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.11-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.11-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cloud
        run: bun run --cwd apps/cloud build
        env:
          VITE_PUBLIC_SENTRY_DSN: ${{ secrets.VITE_PUBLIC_SENTRY_DSN }}

      - name: Promote cloud version
        run: bun run scripts/promote-cloud.ts --percent "${PROMOTE_PERCENT}" --version "${PROMOTE_VERSION}"
        working-directory: apps/cloud
        env:
          PROMOTE_PERCENT: ${{ inputs.promote_percent }}
          PROMOTE_VERSION: ${{ inputs.promote_version }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Marketing deploys on the normal merge-to-main path only. A promote-only
  # workflow_dispatch targets the cloud worker and must not redeploy marketing.
  deploy-marketing:
    name: Deploy marketing
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.11-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.11-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build marketing
        run: bun run --cwd apps/marketing build

      - name: Deploy marketing
        run: bun run wrangler deploy --config dist/server/wrangler.json
        working-directory: apps/marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
